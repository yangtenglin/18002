server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    charset utf-8;

    client_max_body_size 10M;

    access_log /var/log/nginx/hotel-simulation.access.log;
    error_log /var/log/nginx/hotel-simulation.error.log;

    location / {
        root /home/ubuntu/hotel-simulation/frontend/dist;
        try_files $uri $uri/ /index.html;
        index index.html;

        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~* \.(?:css|js|woff2?|eot|ttf|otf|ico|png|jpg|jpeg|gif|svg|webp)$ {
        root /home/ubuntu/hotel-simulation/frontend/dist;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /home/ubuntu/hotel-simulation/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
